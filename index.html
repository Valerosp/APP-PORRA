<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 - Filà Filá</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ========================================================
           ESTILO GAMER "PENKA STYLE" PARA EL JUGADOR
           ======================================================== */
        :root {
            --bg-dark: #0d1117;
            --card-grad: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --penka-grad: linear-gradient(135deg, #114c2b 0%, #4a3f10 50%, #7e1e1e 100%);
            --accent-gold: #f59e0b;
            --accent-green: #10ac84;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, rgba(13, 17, 23, 0.8), rgba(13, 17, 23, 1)), 
                        url('https://images.unsplash.com/photo-1518605368461-1ee7e53f5312?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 90px; /* Espacio para la barra inferior */
        }

        .contenedor.usuario {
            max-width: 600px; /* Diseño estrecho tipo móvil */
            margin: 0 auto;
            padding: 20px;
        }

        /* Cabecera Superior */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .top-header img { max-height: 40px; }
        .top-header .right-actions { display: flex; gap: 10px; align-items: center; }
        
        /* Botón de Reglas arriba */
        #btnTabReglas {
            background: rgba(255,255,255,0.1); color: white; border: none;
            width: 35px; height: 35px; border-radius: 50%;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }

        /* Inputs y Selects */
        select, input[type="password"], input[type="text"], input[type="number"] {
            background: rgba(0,0,0,0.5) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            color: white !important;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            width: 100%;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent-gold) !important; }

        /* Tarjetas estilo Penka */
        .tarjeta {
            background: var(--penka-grad) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 16px !important;
            padding: 20px !important;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5) !important;
            position: relative;
            overflow: hidden;
        }
        /* Decoración de la tarjeta */
        .tarjeta::before {
            content: '🏆'; position: absolute; right: -15px; top: -15px;
            font-size: 80px; opacity: 0.05; transform: rotate(15deg); pointer-events: none;
        }
